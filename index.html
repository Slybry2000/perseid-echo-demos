<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Perseid Echo — Demos</title>
  <meta name="description" content="An index of demo sites by Perseid Echo." />
  <meta name="theme-color" content="#0F1F15" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --moss: #0F1F15;
      --moss-deep: #071510;
      --cream: #FAF8F2;
      --gold: #C9A227;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background: var(--moss);
      color: var(--cream);
      font-family: 'EB Garamond', Georgia, serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      min-height: 100svh;
    }
    ::selection { background: var(--gold); color: var(--moss-deep); }

    .page {
      min-height: 100svh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: clamp(32px, 5vw, 72px);
      gap: clamp(48px, 8vh, 96px);
    }

    .chrome {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }
    .wordmark {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
    }
    .index-tag {
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(250, 248, 242, 0.55);
    }

    .main {
      display: grid;
      align-content: center;
      gap: clamp(48px, 6vh, 80px);
      max-width: 880px;
    }

    .lede {
      font-weight: 500;
      font-size: clamp(40px, 5.6vw, 76px);
      line-height: 1.04;
      letter-spacing: -0.015em;
      max-width: 18ch;
    }
    .lede em {
      font-style: italic;
      color: var(--gold);
      font-weight: 500;
    }

    .demos {
      list-style: none;
      border-top: 1px solid rgba(250, 248, 242, 0.18);
    }
    .demos li {
      border-bottom: 1px solid rgba(250, 248, 242, 0.12);
    }
    .demos a {
      display: grid;
      grid-template-columns: 56px minmax(0, 1fr) auto;
      column-gap: 24px;
      align-items: baseline;
      padding: 28px 0;
      text-decoration: none;
      color: var(--cream);
      transition: color 200ms ease, transform 220ms ease;
    }
    .demos a:hover,
    .demos a:focus-visible {
      color: var(--gold);
      outline: none;
    }
    .demos a:hover .arrow,
    .demos a:focus-visible .arrow {
      transform: translateX(6px);
      color: var(--gold);
    }

    .num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.18em;
      color: var(--gold);
      padding-top: 12px;
    }
    .demo-name {
      font-weight: 500;
      font-size: clamp(28px, 3.2vw, 44px);
      line-height: 1.15;
      letter-spacing: -0.01em;
    }
    .demo-sub {
      display: block;
      margin-top: 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(250, 248, 242, 0.55);
    }
    .arrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: rgba(250, 248, 242, 0.55);
      transition: transform 220ms ease, color 220ms ease;
      align-self: center;
    }

    .footer {
      display: flex;
      justify-content: space-between;
      gap: 24px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(250, 248, 242, 0.55);
    }

    @media (max-width: 600px) {
      .demos a { grid-template-columns: 40px minmax(0, 1fr) auto; column-gap: 16px; }
      .footer { flex-direction: column; gap: 8px; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { transition: none !important; animation: none !important; }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="chrome">
      <span class="wordmark">Perseid Echo</span>
      <span class="index-tag">INDEX / DEMOS</span>
    </header>

    <main class="main">
      <h1 class="lede">A small index of <em>demo</em> sites.</h1>

      <ol class="demos" role="list">
        <li>
          <a href="dream-travel/">
            <span class="num">01</span>
            <span>
              <span class="demo-name">Dream Travel</span>
              <span class="demo-sub">Boutique travel concierge</span>
            </span>
            <span class="arrow" aria-hidden="true">&rarr;</span>
          </a>
        </li>
        <li>
          <a href="riley-lawns/">
            <span class="num">02</span>
            <span>
              <span class="demo-name">Riley Lawns</span>
              <span class="demo-sub">Premium lawn care &middot; Seattle</span>
            </span>
            <span class="arrow" aria-hidden="true">&rarr;</span>
          </a>
        </li>
      </ol>
    </main>

    <footer class="footer">
      <span>PERSEID ECHO &middot; DEMOS</span>
      <span>&copy; 2026</span>
    </footer>
  </div>
</body>
</html>
